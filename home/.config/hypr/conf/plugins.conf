plugin {

    hyprbars {
        bar_height = 33
        bar_color = $bg1
        bar_blur = true

        bar_title_enabled = true
        bar_text_size = 12
        bar_text_font = ShureTechMono Nerd Font Propo Regular   # local via home/.fonts/ (ShareTechMono) or packaged fallback

        bar_text_align = center
        bar_buttons_alignment = left

        bar_padding = 15
        bar_button_padding = 6

        # Title text color from Matugen (using $fg alias for compatibility)
        col.text = $fg

        # Classic macOS-style window buttons (fixed, not affected by Matugen/wallpaper)
        hyprbars-button = rgb(ff5f57), 15, , hyprctl dispatch killactive
        hyprbars-button = rgb(ffbd2e), 15, , ~/.config/hypr/scripts/hyprbars-minimize.sh
        hyprbars-button = rgb(27c93f), 15, , hyprctl dispatch fullscreen 1

        # cmd to run on double click of the bar
        on_double_click = hyprctl dispatch fullscreen 1
    }

    hyprfocus {
      mode = bounce

      bounce_strength = 0.9
    }

    hyprtrails {
        color = rgb(c0c8d5)
    }

    hyprwinwrap {
        # class is an EXACT match and NOT a regex!
        class = htop-kitty
    }

    hyprscrolling {
        column_width = 0.6                 # each column ~60% of monitor width
        fullscreen_on_one_column = true   # one column doesn’t auto-fullscreen
        follow_focus = true                # view centers on focused window
        focus_fit_method = 0               # 0=center, 1=fit column fully on screen
        explicit_column_widths = 0.5,0.67,0.8,1.0
    }

    # Mission Control / macOS-style workspace + window overview
    # Triggered via hot corners (hyprcorners) or keybind (ALT+` / ALT+Shift+`)
    hymission {
        layout_engine = "mission-control"   # or "apple", "natural", "expose", "grid"
        expand_selected_window = 1
        overview_focus_follows_mouse = 1
        multi_workspace_sort_recent_first = 1
        toggle_switch_mode = 1
        switch_toggle_auto_next = 1
        switch_release_key = "Alt_L"

        outer_padding_top = 80
        outer_padding_bottom = 40
        outer_padding_left = 40
        outer_padding_right = 40
        row_spacing = 28
        column_spacing = 28

        workspace_strip_anchor = "left"
        workspace_strip_thickness = 140
        hide_bar_when_strip = 1
    }
}
