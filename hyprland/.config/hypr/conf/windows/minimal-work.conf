# Minimal work layout - maximizes usable space
# No rounding, almost no gaps, thin/no borders

general {
    gaps_in = 5
    gaps_out = 1
    border_size = 2
    col.active_border = $source_color
    col.inactive_border = $tertiary
    layout = dwindle
    resize_on_border = true
}

decoration {
    rounding = 2
    active_opacity = 1.0
    inactive_opacity = 0.95
    fullscreen_opacity = 1.0

    #blur {
    #    enabled = true
    #    size = 12
    #    passes = 6
    #    new_optimizations = on
    #    ignore_opacity = true
    #    xray = true
        # blurls = waybar
    }

    shadow {
        enabled = true
        range = 30
        render_power = 3
        color = 0x66000000
    }
}
