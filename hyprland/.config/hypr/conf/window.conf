# ----------------------------------------------------- 
# General window layout and colors
# name: "Default"
# ----------------------------------------------------- 

general {
    gaps_in = 10
    gaps_out = 14
    border_size = 3
    col.active_border = $source_color
    col.inactive_border = $tertiary  # tertiary from Matugen for subtle inactive windows
    layout = dwindle
    resize_on_border = true
}
