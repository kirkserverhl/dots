# -----------------------------------------------------
# Autostart
# ----------------------------------------------------- 

$SCRIPTS = ~/.config/hypr/scripts

# Hyprpm
exec-once = hyprpm reload

# Hot corners → Mission Control (hymission)
# Custom geometry-aware implementation (hotcorners.sh) because the original
# cargo tool doesn't understand multi-monitor layouts with offsets.
# Uses wrapper with auto-restart for reliability.
exec-once = $SCRIPTS/start-hyprcorners.sh

# Privilege escalation
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# Using hypridle to start hyprlock
exec-once = hypridle & waybar

# For images too (recommended)
exec-once = wl-paste --type image --watch cliphist store

# Start autostart cleanup
exec-once = $SCRIPTS/cleanup.sh

exec-once = $SCRIPTS/reload_wallpaper.sh

# Symlinks for scripts
exec-once = waypaper-engine daemon
# exec-once = killall waybar && hyprpaper && waypaper --restore

# Load Dunst Notification Manager
exec-once = dunst

# hyprctl.sh (applies extra keywords from json)
exec = ~/.config/hypr/hyprctl/hyprctl.sh

# Start Waypaper
exec-once = ~/.local/bin/waypaper --r

# Cursor
exec-once = hyprctl setcursor Bibata-Modern-Classic-Gruvbox 24

# Workspaces
exec-once = $SCRIPTS/monitor-workspaces.sh

# load all the plugins you installed
# (hyprexpo removed - not present on this system; hymission + others loaded via hyprpm)
# exec-once = hyprctl plugin load "$HYPR_PLUGIN_DIR/lib/libhyprexpo.so"

# Auto-mount removable storage
exec-once = udiskie


