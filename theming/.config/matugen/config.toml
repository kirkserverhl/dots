[config]
version_check = false
caching = false
expr_prefix = "{{"
expr_postfix = "}}"
block_prefix = "<*"
block_postfix = "*>"

[config.wallpaper]
command = "set_wallpaper {{ image }}"
set = true

# Firefox theming via pywalfox.
# Matugen generates a wal-compatible colors file that pywalfox consumes.
# This is the current way colors reach Firefox (not the old pywal tool).
[templates.firefox]
input_path = 'templates/firefox.json'
output_path = '~/.cache/wal/colors.json'
post_hook = 'pywalfox update; pywalfox {{mode | lower_case}}'

[templates.gtk3]
input_path = 'templates/gtk.css'
output_path = '~/.config/gtk-3.0/colors.css'
post_hook = 'gsettings set org.gnome.desktop.interface gtk-theme ""; gsettings set org.gnome.desktop.interface gtk-theme {{ mode | replace: "light", "adw-gtk3" | replace: "dark", "adw-gtk3-dark" }}; gsettings set org.gnome.desktop.interface color-scheme {{ mode | replace: "light", "default" | replace: "dark", "prefer-dark" }}'

[templates.gtk4]
input_path = 'templates/gtk.css'
output_path = '~/.config/gtk-4.0/colors.css'

[templates.qt]
input_path = 'templates/qt.colors'
output_path = '~/.local/share/color-schemes/Matugen.colors'

[templates.hyprland]
input_path = "templates/hyprland.conf"
output_path = "~/.config/hypr/colors.conf"
post_hook = 'hyprctl setcursor "{{ mode | replace: "light", "Bibata-Modern-Ice" | replace: "dark", "Bibata-Modern-Classic" }}" 24'

[templates.waybar]
input_path = "templates/waybar.css"
output_path = "~/.config/waybar/colors/matugen.css"

[templates.ghostty]
input_path = "templates/ghostty"
output_path = "~/.config/ghostty/colors"
post_hook = "kill -s USR2 $(pgrep ghostty)"

[templates.materialized-web]
input_path = "templates/materialized-web.json"
output_path = "~/.config/matugen/materialized-web/scheme/current.json"

[templates.nvim]
input_path = "templates/nvim.lua"
output_path = "~/.local/share/nvim/matugen.lua"

[templates.tshell]
input_path = "templates/tshell.toml"
output_path = "~/.config/tshell/colors.toml"

[templates.lf]
input_path = "templates/lf"
output_path = "~/.config/lf/colors"

[templates.lf-prompt]
input_path = "templates/lf-prompt"
output_path = "~/.config/lf/prompt-colors"
