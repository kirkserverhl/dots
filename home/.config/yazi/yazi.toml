# Yazi main configuration
# See https://yazi-rs.github.io/docs/configuration/yazi/

[manager]
# Show hidden files (dotfiles) by default
show_hidden = true

# Sorting
sort_by = "natural"
sort_sensitive = false
sort_reverse = false
sort_dir_first = true

# Display
linemode = "none"
show_symlink = true

# Mouse
mouse_events = [ "click", "scroll" ]

[preview]
# Image preview settings
max_width  = 1200
max_height = 1200

[opener]
# You can customize openers here if needed

[plugin]
# Plugin settings
prepend_previewers = [
  # Add custom previewers here if needed
]

append_previewers = [
  # ...
]

[input]
# Input behavior

[confirm]
# Confirmation dialogs

[select]
# Selection dialogs

[open]
# "Open with" menu behavior

[tasks]
# Task manager

# Keybindings are in keymap.toml (create it if you want to customize)
