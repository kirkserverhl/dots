[main]
initial-color-theme={{ mode }}

[colors-dark]
background={{ colors.surface.dark.hex_stripped }}
foreground={{ colors.on_surface.dark.hex_stripped }}
selection-background={{ colors.primary_container.dark.hex_stripped }}
selection-foreground={{ colors.on_primary_container.dark.hex_stripped }}
cursor={{ colors.surface.dark.hex_stripped }} {{ colors.on_surface.dark.hex_stripped }}
regular0={{ colors.surface.dark.hex_stripped }}
bright0={{ colors.surface_container_highest.dark.hex_stripped }}
regular1={{ colors.error.dark.hex_stripped | lighten: -8.0 }}
bright1={{ colors.error.dark.hex_stripped | lighten: 10.0 }}
regular2={{
  "#00ff00" | to_color
  | blend: {{ colors.primary_fixed.dark.hex }}, 0.60
  | lighten: -8.0
  | format: "hex_stripped"
}}
bright2={{
