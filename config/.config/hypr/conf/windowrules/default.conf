  match:class = ^(waypaper)$
}
# htop (duplicate block)
windowrule = match:title ^(htop)$, float on
windowrule = match:title ^(htop)$, size 900 600
windowrule = match:title ^(htop)$, move 100%-w-20 20

# bpytop / btop (duplicate block)
windowrule = match:title ^(btop)$, float on
windowrule = match:title ^(btop)$, size 1000 700
windowrule = match:title ^(btop)$, move 100%-w-20 20


windowrule {
  name = windowrule-2
  float = on
