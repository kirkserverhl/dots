# Ghostty colors generated by matugen
# Output target: ~/.config/ghostty/colors/matugen.conf

background = {{ colors.surface_container_lowest.dark.hex }}
foreground = {{ colors.on_surface.dark.hex }}

cursor-color = {{ colors.primary.dark.hex }}
cursor-text = {{ colors.on_primary.dark.hex }}

selection-foreground = {{ colors.on_secondary.dark.hex }}
selection-background = {{ colors.secondary.dark.hex }}

# 16-color palette (modeled after the Kitty matugen template)
palette = 0={{ colors.surface.dark.hex }}
palette = 1={{ base16.base08.dark.hex | lighten: -20.0 }}
palette = 2={{ colors.secondary_fixed_dim.dark.hex }}
palette = 3={{ colors.tertiary_fixed_dim.dark.hex }}
palette = 4={{ colors.on_primary_fixed_variant.dark.hex }}
palette = 5={{ colors.on_secondary_fixed_variant.dark.hex }}
palette = 6={{ colors.on_tertiary_fixed_variant.dark.hex }}
palette = 7={{ colors.on_surface_variant.dark.hex }}
palette = 8={{ colors.surface_container_highest.dark.hex }}
palette = 9={{ base16.base08.dark.hex | lighten: 10.0 }}
palette = 10={{ colors.secondary_fixed.dark.hex }}
palette = 11={{ colors.tertiary_fixed.dark.hex }}
palette = 12={{ colors.primary.dark.hex }}
palette = 13={{ colors.secondary.dark.hex }}
palette = 14={{ colors.tertiary.dark.hex }}
palette = 15={{ colors.on_surface.dark.hex }}
