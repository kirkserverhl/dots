# ----------------------------------------------------- 
# General window decoration
# name: "Rounding More Blur"
# ----------------------------------------------------- 

decoration {
  rounding = 10

  # High opacity = solid windows (this is what removes the unwanted transparency)
  active_opacity   = 1.0
  inactive_opacity = 0.97     # very subtle dim on unfocused windows for focus indication
  fullscreen_opacity = 1.0

  blur {
      enabled = true
      size = 8
      passes = 4              # higher quality blur (more passes)
      new_optimizations = on
      ignore_opacity = true   # required for good results with high opacity
      xray = true
      noise = 0.08
      contrast = 0.9
      brightness = 0.85
      # blurls = waybar
  }

  shadow {
      enabled = true
      range = 30
      render_power = 3
      color = 0x66000000
  }
}
