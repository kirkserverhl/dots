# : Manager [[[

[mgr]
cwd = { fg = "#e7e0e8" }

# Find
find_keyword  = { fg = "#ffb4ab", bold = true, italic = true, underline = true }
find_position = { fg = "#ffb4ab", bold = true, italic = true }

# Marker
marker_copied   = { fg = "#ff738d", bg = "#ff738d" }
marker_cut      = { fg = "#ffd9e0", bg = "#ffd9e0" }
marker_marked   = { fg = "#ffb4ab", bg = "#ffb4ab" }
marker_selected = { fg = "#f1b7c4", bg = "#f1b7c4" }

# Count
count_copied   = { fg = "#32101a", bg = "#ffd9e0" }
count_cut      = { fg = "#32101a", bg = "#ffd9e0" }
count_selected = { fg = "#39255b", bg = "#f1b7c4" }

# Border
border_symbol = "│"
border_style  = { fg = "#d4bbfc" }

# : ]]]


# : Indicator [[[

[indicator]
padding = { open = "█", close = "█" }

# : ]]]


# : Tabs [[[

[tabs]
active    = { fg = "#d4bbfc", bold = true, bg = "#151218" }
inactive  = { fg = "#cdc2db", bg = "#151218" }
sep_inner = { open = "[", close = "]" }

# : ]]]


# : Mode [[[

[mode]
# Mode
normal_main = { bg = "#d4bbfc", fg = "#39255b", bold = true }
normal_alt  = { bg = "#49454e", fg = "#cbc4cf" }

# Select mode
select_main = { bg = "#cdc2db", fg = "#342d40", bold = true }
select_alt  = { bg = "#49454e", fg = "#cbc4cf" }

# Unset mode
unset_main = { bg = "#f1b7c4", fg = "#4a252f", bold = true }
unset_alt  = { bg = "#49454e", fg = "#cbc4cf" }

# : ]]]


# : Status [[[

[status]
sep_left  = { open = "🭁", close = "🭠" }
sep_right = { open = "🭁", close = "🭠" }

# Permissions
perm_type  = { fg = "#7e62a2" }
perm_write = { fg = "#d8375b" }
perm_read  = { fg = "#ff2b12" }
perm_exec  = { fg = "#ff4063" }
perm_sep   = { fg = "#9443ff" }

# Progress
progress_label  = { bold = true }
progress_normal = { fg = "#d4bbfc", bg = "#3b383e" }
progress_error  = { fg = "#ffb4ab", bg = "#3b383e" }

# : ]]]


# : Which [[[

[which]
cols = 3
mask = { bg = "#3b383e" }
cand = { fg = "#d4bbfc" }
rest = { fg = "#39255b" }
desc = { fg = "#e7e0e8" }
separator = " ▶ "
separator_style = { fg = "#e7e0e8" }

# : ]]]


# : Notify [[[

[notify]
title_info  = { fg = "#f1b7c4" }
title_warn  = { fg = "#d4bbfc" }
title_error = { fg = "#ffb4ab" }

# : ]]]


# : Picker [[[

[pick]
border = { fg = "#d4bbfc" }
active = { fg = "#f1b7c4", bold = true }
inactive = {}

# : ]]]


# : Input [[[

[input]
border = { fg = "#d4bbfc" }
value  = { fg = "#e7e0e8" }

# : ]]]


# : Completion [[[

[cmp]
border = { fg = "#d4bbfc", bg = "#39255b" }

# : ]]]


# : Tasks [[[

[tasks]
border  = { fg = "#d4bbfc" }
title   = {}
hovered = { fg = "#ffd9e0", underline = true }

# : ]]]


# : Help [[[

[help]
on     = { fg = "#e7e0e8" }
run    = { fg = "#e7e0e8" }
footer = { fg = "#342d40", bg = "#cdc2db" }

# : ]]]


# : File-specific styles [[[

[filetype]

rules = [
    # Images
    { mime = "image/*", fg = "#94e2d5" },

    # Media
    { mime = "{audio,video}/*", fg = "#f9e2af" },

    # Archives
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#f5c2e7" },

    # Documents
    { mime = "application/{pdf,doc,rtf}", fg = "#a6e3a1" },

    # Special files
    { url = "*", is = "orphan", bg = "#93000a" },
    { url = "*", is = "exec", fg = "#ffdad6" },

    # Fallback
    { url = "*", fg = "#e7e0e8" },
    { url = "*/", fg = "#d4bbfc" },
]

# : ]]]
conds = [
	# Special files
	{ if = "orphan", text = "", fg = "#d4bbfc" },
	{ if = "link", text = "", fg = "#d4bbfc" },
	{ if = "block", text = "", fg = "#d4bbfc" },
	{ if = "char", text = "", fg = "#d4bbfc" },
	{ if = "fifo", text = "", fg = "#d4bbfc" },
	{ if = "sock", text = "", fg = "#d4bbfc" },
	{ if = "sticky", text = "", fg = "#d4bbfc" },
	{ if = "dummy", text = "", fg = "#d4bbfc" },

	# Fallback
	{ if = "dir", text = "", fg = "#d4bbfc" },
	{ if = "exec", text = "", fg = "#d4bbfc" },
	{ if = "!dir", text = "", fg = "#d4bbfc" },
]
# : }}}
