# Hot corners configuration for hymission (Mission Control)
#
# We no longer use the original cargo "hyprcorners" binary (it only supports
# a single 0,0 rectangle and doesn't work with your multi-monitor layout).
#
# Current implementation: ~/.config/hypr/scripts/hotcorners.sh
#   - Fully geometry-aware (uses real monitor positions from hyprctl)
#   - Watches the actual bottom-left corner of the leftmost monitor
#   - Watches the actual bottom-right corner of the rightmost monitor
#   - Also supports "all-bottom" mode if you want every monitor's bottom corners
#
# Restart the feature:
#   pkill -9 -f hotcorners; setsid ~/.config/hypr/scripts/hotcorners.sh >> /tmp/hotcorners.log 2>&1 < /dev/null &

# How often to check cursor position (ms). Lower = more responsive but more CPU.
timeout = 90

# Size of the virtual screen area hyprcorners monitors for corners.
# Using your main monitor (DP-1) logical resolution.
# If you want corners on the entire multi-monitor layout, increase these.
screen_width = 1920
screen_height = 1080

# Corner trigger zone size in pixels.
# Small values (20-40) = EXTREMELY sensitive (constant accidental triggers).
# Recommended: 90-130 for deliberate but not annoying activation.
# 28 was way too small — that's why it was firing constantly.
corner_radius = 110

[bottom_left]
# Move mouse to bottom-left corner of main screen → Mission Control (all workspaces)
radius = 110
dispatcher = "hymission:toggle"
args = "forceall"          # Show windows from ALL workspaces (true Mission Control feel)

[bottom_right]
# Move mouse to bottom-right corner of main screen → Mission Control (all workspaces)
radius = 110
dispatcher = "hymission:toggle"
args = "forceall"

# Optional: you can also do only-current-workspace on one corner
# [bottom_left]
# radius = 25
# dispatcher = "hymission:toggle"
# args = "onlycurrentworkspace"

# Other possible corners if you want them later:
# [top_left]
# [top_right]

# Tips:
# - Test with the one-liner in the big comment block below
# - Radius is now controlled inside hotcorners.sh (default 110)
# - Bottom corners are easy to hit by accident — the script has a cooldown
# - Edit MODE= in the script if you want every monitor's bottom corners instead of just the outer extremes.

################################################################################
# STATUS: Custom smart hot corners (May 2026)
#
# The old cargo hyprcorners binary has been retired for this setup.
# We now use a custom script (hotcorners.sh) that understands your real
# monitor positions and only triggers on the physical bottom corners.
#
# Current behavior (MODE=extreme):
#   - Bottom-left hot zone  → leftmost monitor (DVI-I-1) bottom-left corner
#   - Bottom-right hot zone → rightmost monitor (DVI-I-2) bottom-right corner
#
# Keyboard alternatives (both do forceall / full Mission Control):
#   ALT + `     (grave/tilde key)
#   ALT + Down  (new, per your request)
#
# To test the mouse corners right now:
#   pkill -9 -f hotcorners
#   setsid ~/.config/hypr/scripts/hotcorners.sh >> /tmp/hotcorners.log 2>&1 < /dev/null &
#
# Then move your mouse slowly into the bottom-left or bottom-right pixels
# of your leftmost or rightmost screen.
#
# If you want corners on *every* monitor's bottom instead of just the extremes,
# edit the script and change MODE="extreme" to MODE="all-bottom".
