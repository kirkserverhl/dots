# ----------------------------------------------------- 
# Key bindings
# name: "Default"
# ----------------------------------------------------- 
# =============================================
# Hyprland Keybinds - CLEANED & ORGANIZED
# =============================================

# === Modifiers ==
$mainMod = SUPER
$mod = ALT
$SCRIPTS = ~/.config/hypr/scripts

# Mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow -+

# Mouse wheel workspace switching
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up,   workspace, e-1

# NOT LISTED ON KEYBIND SCRIPT
bind = $mainMod, mouse_down, workspace, e+1 # Open next workspace
bind = $mainMod, mouse_up, workspace, e-1 # Open previous workspace
bind = $mainMod CTRL, SPACE, workspace, empty # Open the next empty workspace

# === MAC-STYLE SHORTCUTS ===
binde = $mainMod, C, sendshortcut, CTRL, INSERT, activewindow   # Copy
binde = $mainMod, V, sendshortcut, SHIFT, INSERT, activewindow  # Paste (plain)
binde = $mainMod SHIFT, V, sendshortcut, CTRL, V, activewindow  # Paste with formatting
binde = $mainMod, X, sendshortcut, CTRL, X, activewindow        # Cut
binde = $mainMod, Z, sendshortcut, CTRL, Z, activewindow        # Undo
binde = $mainMod, I, sendshortcut, CTRL, I, activewindow        # Italic
binde = $mainMod, U, sendshortcut, CTRL, U, activewindow        # Underline
binde = $mainMod, K, sendshortcut, CTRL, K, activewindow        # Insert link

# === TERMINALS & LAUNCHERS ===
bind = $mainMod, RETURN, exec, kitty
bind = $mod, RETURN, exec,  ghostty               # optional second terminal

# Browsers
bind = $mainMod, B, exec, brave-browser                 # Brave as main
bind = CTRL, B, exec, google-chrome-stable      # Chrome as secondary
bind = $mod, B, exec, firefox

# File Managers
bind = $mainMod, Y, exec, kitty yazi
bind = $mainMod, F, exec, dolphin

# Editors & Monitoring
bind = $mainMod, N, exec, kitty nvim
bind = $mod, H, exec, kitty htop
bind = $mod, T, exec, kitty bpytop

# Utilities
bind = $mainMod $mod, P, exec, kitty pacseek
bind = $mod, P, exec, hyprpicker -a
bind = CTRL, P, exec, $SCRIPTS/palette.sh
bind = $mainMod, E, exec, smile
bind = $mod, C, exec, $SCRIPTS/rofi_calc.sh

# === ACTIONS ===
bind = $mainMod CTRL, Q, exec, $SCRIPTS/launch-wlogout.sh
bind = $mainMod, L, exec, hyprlock -c ~/.config/hypr/hyprlock/hyprlock.conf
bind = CTRL ALT, DELETE, exec, $SCRIPTS/launch-wlogout.sh
bind = $mod, V, togglefloating,
bind = $mod, L, exec, hyprlock

# Or simple toggle on/off
bind = $mod, W, exec, killall waybar || waybar

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace
bind = $mainMod SHIFT, S, movetoworkspace, special

# Screenshots
bind = $mod, PRINT, exec, $SCRIPTS/hyprshot.sh          # Screenshot Rofi
bind = $mainMod, PRINT, exec, $SCRIPTS/quickshot.sh     # Quick screenshot

# Clip Hitory
bind = $mainMod CTRL, C, exec, $SCRIPTS/cliphist.sh

# Application Launcher
bind = $mainMod, SPACE, exec, pkill rofi || rofi -show drun -replace -i -terminal kitty

# Wallpaper
bind = $mainMod, W, exec, waypaper                                         # Waypaper GUI (full settings: backend, folder, etc.)
# bind = $mainMod SHIFT, W, exec, pkill rofi || $SCRIPTS/rofi-wallpaper.sh   # Fast Rofi grid selector (optional)

# Bar
bind = $mainMod CTRL, W, exec, $SCRIPTS/toggle-waybar.sh

# bind = $mainMod SHIFT, W, exec, $SCRIPTS/window-rofi.sh
bind = $mod, M, exec, $SCRIPTS/monitor-rofi.sh

# Theme switcher
bind = $mainMod, T, exec, pkill rofi || ~/.config/colorschemes/rofi-launcher.sh

# Unlock Root
bind = $mainMod, U, exec, $SCRIPTS/unlockroot.sh

# Night / Blitz Mode
bind = $mod, N, exec, ~/.local/bin/night-mode.sh

#bind = SUPER F1, exec, $SCRIPTS/blitz-mode.sh   # WIN = SUPER

# === WINDOW MANAGEMENT ===
bind = $mainMod, Q, killactive
bind = CTRL, F, fullscreen
bind = $mod, F, togglefloating
bind = $mod SHIFT, S, layoutmsg, swapsplit
bind = $mainMod, P, pseudo                          # Dwindle: pseudotile

# Focus (Arrows + Vim)
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# Move Windows
bind = $mainMod CTRL, left,  movewindow, l
bind = $mainMod CTRL, right, movewindow, r
bind = $mainMod CTRL, up,    movewindow, u
bind = $mainMod CTRL, down,  movewindow, d
bind = $mainMod CTRL, H, movewindow, l
bind = $mainMod CTRL, L, movewindow, r
bind = $mainMod CTRL, K, movewindow, u
bind = $mainMod CTRL, J, movewindow, d

# Resize
bind = $mainMod SHIFT, right, resizeactive, 100 0
bind = $mainMod SHIFT, left,  resizeactive, -100 0
bind = $mainMod SHIFT, down,  resizeactive, 0 100
bind = $mainMod SHIFT, up,    resizeactive, 0 -100
bind = $mainMod SHIFT, L, resizeactive, 100 0
bind = $mainMod SHIFT, H, resizeactive, -100 0
bind = $mainMod SHIFT, J, resizeactive, 0 100
bind = $mainMod SHIFT, K, resizeactive, 0 -100

# === MEDIA & HARDWARE (Function Key Layer) ===
# Brightness
bindel = , F1, exec, $SCRIPTS/brightness.sh --dec
bindel = , F2, exec, $SCRIPTS/brightness.sh --inc

# Volume
bindel = , F3, exec, $SCRIPTS/volume.sh --dec
bindel = , F4, exec, $SCRIPTS/volume.sh --inc

# CMatrix fullscreen (F5) - kitty -e cmatrix but fullscreen on current monitor, toggle on/off
bind = , F5, exec, kitty -e cmatrix Fullscreen #$SCRIPTS/cmatrix-saver.sh

# Emoji picker
bind = , F6, exec, smile

# Screenshot (rofi-based)
bindel = , F7, exec, $SCRIPTS/hyprshot.sh

# Microphone mute toggle
bind = , F8, exec, $SCRIPTS/volume.sh --toggle-mic

# Media Controls
bind = , F9,  exec, playerctl previous
bind = , F10, exec, playerctl play-pause
bind = , F11, exec, playerctl next

# Volume mute
bind = , F12, exec, $SCRIPTS/volume.sh --toggle

# Open pavucontrol (kept for convenience)
bind = $mod SUPER, P, exec, pavucontrol

# === SPECIAL WORKSPACES ===
bind = $mod, S, togglespecialworkspace
bind = $mod SHIFT, S, movetoworkspace, special

# === WORKSPACES ===
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9

bind = $mainMod SHIFT, E, movetoworkspace, empty

# Tab Through  Workspaces
bind = $mainMod, Tab, workspace, m+1
bind = $mainMod SHIFT, Tab, workspace, m-1

# Snappy Tab
bind = $mod, Tab, exec, snappy-switcher next
bind = $mod SUPER, Tab, exec, snappy-switcher prev

# Mission Control style overview (hymission)
# Mouse: bottom-left / bottom-right corners of your actual monitors (via custom hotcorners.sh)
# Keyboard: ALT + `  or  ALT + Down
bind = $mod, grave, hymission:toggle,forceall                   # ALT + `  (all workspaces)
bind = $mod SHIFT, grave, hymission:toggle,onlycurrentworkspace  # ALT + Shift + `  (current workspace only)
bind = $mod, down, hymission:toggle,forceall                    # ALT + Down arrow  (your request)

# Alternative options (uncomment if you prefer):
# bind = $mod, up, hymission:toggle,forceall
# bind = $mod, F3, hymission:toggle,forceall

# Move all windows to workspace
bind = $mainMod CTRL, 1, exec, $SCRIPTS/moveTo.sh 1
bind = $mainMod CTRL, 2, exec, $SCRIPTS/moveTo.sh 2
bind = $mainMod CTRL, 3, exec, $SCRIPTS/moveTo.sh 3
bind = $mainMod CTRL, 4, exec, $SCRIPTS/moveTo.sh 4
bind = $mainMod CTRL, 5, exec, $SCRIPTS/moveTo.sh 5
bind = $mainMod CTRL, 6, exec, $SCRIPTS/moveTo.sh 6
bind = $mainMod CTRL, 7, exec, $SCRIPTS/moveTo.sh 7
bind = $mainMod CTRL, 8, exec, $SCRIPTS/moveTo.sh 8
bind = $mainMod CTRL, 9, exec, $SCRIPTS/moveTo.sh 9

# === ZOOM / ACCESSIBILITY ===
binde = $mod, equal,       exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor | awk '/^float.*/ {print $2 * 1.1}')
binde = $mod, minus,       exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor | awk '/^float.*/ {print $2 * 0.9}')
binde = $mod, KP_ADD,      exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor | awk '/^float.*/ {print $2 * 1.1}')
binde = $mod, KP_SUBTRACT, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor | awk '/^float.*/ {print $2 * 0.9}')

bind = $mod SUPER, mouse_up,   exec, hyprctl -q keyword cursor:zoom_factor 1
bind = $mod SUPER, mouse_down, exec, hyprctl -q keyword cursor:zoom_factor 1
bind = $mod SUPER, minus,      exec, hyprctl -q keyword cursor:zoom_factor 1
bind = $mod SUPER, 0,          exec, hyprctl -q keyword cursor:zoom_factor 1

# OBS Recording (pass through)
bind = Control_L Super, R, pass, class:^(com\.obsproject\.Studio)$

# Titlebars
$hyprbars = /var/cache/hyprpm/kirk/hyprland-plugins/hyprbars.so
bind = $mainMod, R, exec, hyprctl plugin load $hyprbars
bind = $mainMod Shift, R, exec, hyprctl plugin unload $hyprbars

# Layout
bind = $mainMod, J, exec, hyprctl keyword general:layout scrolling
bind = $mainMod Shift, J, exec, hyprctl keyword general:layout master

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Master layout
bind = $mod, Z, layoutmsg, addmaster
bind = $mod SUPER, Z, layoutmsg, removemaster
bind = $mod, H, layoutmsg, mfact -0.05
bind = $mod, L, layoutmsg, mfact +0.05

# Scrolling layout
# move the view by columns
bind = SUPER, period, layoutmsg, move +col
bind = SUPER, comma,  layoutmsg, move -col

# Notification Center (Dunst)
bind = $mod, A, exec, dunstctl history-pop
bind = $mod Control Shift, A, exec, dunstctl close-all

# Extra useful Dunst controls
bind = $mod SUPER, A, exec, dunstctl set-paused toggle     # Toggle pause notifications
bind = $mod, D, exec, dunstcl history-pop               # Open action menu on current notification

#bind = $mainMod CTRL, 0, exec, $SCRIPTS/moveTo.sh 10 # Move all windows to workspace 10

