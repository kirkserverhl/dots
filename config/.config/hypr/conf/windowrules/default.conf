# XDG Desktop Portal
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# QT
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1

# GDK
env = GDK_SCALE,1

# Make it float
windowrule = match:class ^(org.pulseaudio.pavucontrol)$, float on

# Optional: set a reasonable size (adjust as needed)
windowrule = match:class ^(org.pulseaudio.pavucontrol)$, size 600 500

# Position in top-right (with some padding)
windowrule = match:class ^(org.pulseaudio.pavucontrol)$, move 100%-w-20 20

