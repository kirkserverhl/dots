# ----------------------------------------------------- 
# General window decoration
# name: "No Blur or Rounding"
# ----------------------------------------------------- 

decoration {
    rounding = 0
    active_opacity = 1.0
    inactive_opacity = 0.8
    fullscreen_opacity = 1.0

    shadow {
        enabled = true
        range = 30
        render_power = 3
        color = 0x66000000
    }
}
