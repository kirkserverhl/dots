# =============================================================
# LAYER RULES
# =============================================================

layerrule {
  name = layerrule-1
  blur = on
  ignore_alpha = 0.5
  no_anim = on
  match:namespace = waybar
}

#layerrule {
#  name = layerrule-2
#  blur = on
#  ignore_alpha = 0.5
#  match:namespace = swaync-control-center
#}

layerrule {
  name = layerrule-3
  blur = on
  ignore_alpha = 0.5
  match:namespace = swaync-notification-window
}

layerrule {
  name = layerrule-1
  blur = on
  animation = fade
  match:namespace = logout_dialog
}

# wlogout (layer-shell) — used by our launch-wlogout.sh
# We use a gentle fade animation on close so the blurred panel dissolves back to the real sharp desktop.
# We intentionally do NOT add heavy "blur = on" here because the CSS already provides
# the exact blurred background image + the smooth in-animation. Extra compositor blur
# on top would make everything too soft / double-blurred.
layerrule {
  name = layerrule-wlogout
  animation = fade
  match:namespace = wlogout
}

layerrule {
  name = layerrule-2
  blur = on
  animation = popin 95%
  match:namespace = rofi
}

layerrule {
  name = layerrule-3
  animation = fade
  match:namespace = hyprpicker
}

# === FLOATING WINDOW RULES ===

# Terminal utilities (match by kitty + window title)
windowrule {
  name = windowrule-1
  float = on
  match:class = ^(kitty)$
  match:title = ^(htop)$
}

windowrule {
  name = windowrule-2
  float = on
  match:class = ^(kitty)$
  match:title = ^(bpytop)$
}

windowrule {
  name = windowrule-3
  float = on
  match:class = ^(kitty)$
  match:title = ^(yazi)$
}


# You can also force a nice size + center for these small tools
windowrule {
  name = windowrule-4
  size = 1200 800
  center = on
  match:class = ^(kitty)$
  match:title = ^(htop|bpytop|yazi)$
}


# Smile (emoji picker) - usually has class "smile"
windowrule {
  name = windowrule-5
  float = on
  center = on
  match:class = ^(smile)$
}


# Rofi calculator (depends on how your script launches it)
windowrule {
  name = windowrule-6
  float = on
  center = on
  match:class = ^(Rofi)$
}

windowrule {
  name = windowrule-7
  size = 600 400
  match:class = ^(Rofi)$   # adjust size as needed
}

windowrule = match:class ^(waypaper)$, float on

# yazi
windowrule = match:class ^(yazi)$, float on

# CMatrix fullscreen (F5) - does the same as "kitty -e cmatrix" but fullscreen
# Using current v3 syntax for Hyprland 0.53+
windowrule = match:class ^(cmatrix-full)$, float on
windowrule = match:class ^(cmatrix-full)$, border_size 0
windowrule = match:class ^(cmatrix-full)$, fullscreen on
# The script also forces fullscreenstate at runtime after the window exists (more reliable timing)
