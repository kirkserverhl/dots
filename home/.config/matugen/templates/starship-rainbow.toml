# =============================================================================
# Starship Rainbow Prompt - Matugen version
# =============================================================================
# This is a matugen template. It will be processed and written to
# ~/.config/starship/matugen-rainbow.toml on every wallpaper change.
#
# The visual structure (powerline segments + module order) is identical to
# gruvbox-rainbow.toml but all colors are dynamically pulled from matugen's
# Material You palette generated from your current wallpaper.
#
# To activate:
#   export STARSHIP_CONFIG="$HOME/.config/starship/matugen-rainbow.toml"
#   # or copy/symlink to ~/.config/starship.toml
#
# "$schema" = 'https://starship.rs/config-schema.json'

format = """
[оӮ¶](color_orange)\
$os\
$username\
[оӮ°](bg:color_yellow fg:color_orange)\
$directory\
[оӮ°](fg:color_yellow bg:color_aqua)\
$git_branch\
$git_status\
[оӮ°](fg:color_aqua bg:color_blue)\
$c\
$cpp\
$rust\
$golang\
$nodejs\
$bun\
$php\
$java\
$kotlin\
$haskell\
$python\
[оӮ°](fg:color_blue bg:color_bg3)\
$docker_context\
$conda\
$pixi\
[оӮ°](fg:color_bg3 bg:color_bg1)\
$time\
[оӮҙ ](fg:color_bg1)\
$line_break$character"""

palette = 'matugen'

# =============================================================================
# Dynamic Palette from Matugen (Material You)
# =============================================================================
[palettes.matugen]
# Core neutrals
color_fg0 = '{{colors.on_surface.default.hex}}'
color_bg1 = '{{colors.surface_container.default.hex}}'
color_bg3 = '{{colors.surface_container_high.default.hex}}'

# Rainbow powerline segments (chosen for hue variety across most wallpapers)
color_orange = '{{colors.primary.default.hex}}'
color_yellow = '{{colors.tertiary.default.hex}}'
color_aqua   = '{{colors.secondary.default.hex}}'
color_blue   = '{{colors.primary_container.default.hex}}'

# Proper contrast text colors for the vivid accent segments
color_on_orange = '{{colors.on_primary.default.hex}}'
color_on_yellow = '{{colors.on_tertiary.default.hex}}'
color_on_aqua   = '{{colors.on_secondary.default.hex}}'

# Special states (character) вҖ” using only core roles that are always present
color_green  = '{{colors.secondary.default.hex}}'
color_red    = '{{colors.error.default.hex}}'
color_purple = '{{colors.tertiary.default.hex}}'

# =============================================================================
# OS Segment
# =============================================================================
[os]
disabled = false
style = "bg:color_orange fg:color_on_orange"

[os.symbols]
Windows = "у°ҚІ"
Ubuntu = "у°•Ҳ"
SUSE = "пҢ”"
Raspbian = "у°җҝ"
Mint = "у°Јӯ"
Macos = "у°Җө"
Manjaro = "пҢ’"
Linux = "у°ҢҪ"
Gentoo = "у°ЈЁ"
Fedora = "у°Јӣ"
Alpine = "пҢҖ"
Amazon = "пү°"
Android = "оңҺ"
AOSC = "пҢҒ"
Arch = "у°ЈҮ"
Artix = "у°ЈҮ"
EndeavourOS = "пҶ—"
CentOS = "пҢ„"
Debian = "у°Јҡ"
Redhat = "уұ„ӣ"
RedHatEnterprise = "уұ„ӣ"
Pop = "пҢӘ"

# =============================================================================
# Username
# =============================================================================
[username]
show_always = true
style_user = "bg:color_orange fg:color_on_orange"
style_root = "bg:color_orange fg:color_on_orange"
format = '[ $user ]($style)'

# =============================================================================
# Directory
# =============================================================================
[directory]
style = "fg:color_on_yellow bg:color_yellow"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"

[directory.substitutions]
"Documents" = "у°Ҳҷ "
"Downloads" = "пҖҷ "
"Music" = "у°қҡ "
"Pictures" = "пҖҫ "
"Developer" = "у°ІӢ "

# =============================================================================
# Git
# =============================================================================
[git_branch]
symbol = "пҗҳ"
style = "bg:color_aqua"
format = '[[ $symbol $branch ](fg:color_on_aqua bg:color_aqua)]($style)'

[git_status]
style = "bg:color_aqua"
format = '[[($all_status$ahead_behind )](fg:color_on_aqua bg:color_aqua)]($style)'

# =============================================================================
# Language Modules (blue segment)
# =============================================================================
[nodejs]
symbol = "оңҳ"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[bun]
symbol = "оқҜ"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[c]
symbol = "оҳһ "
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[cpp]
symbol = "оҳқ "
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[rust]
symbol = "оһЁ"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[golang]
symbol = "оҳ§"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[php]
symbol = "оҳҲ"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[java]
symbol = "оү–"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[kotlin]
symbol = "оҳҙ"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[haskell]
symbol = "оҳҹ"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[python]
symbol = "оҳҶ"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

# =============================================================================
# Environment / Container Modules (bg3 segment)
# =============================================================================
[docker_context]
symbol = "пҢҲ"
style = "bg:color_bg3"
format = '[[ $symbol( $context) ](fg:color_fg0 bg:color_bg3)]($style)'

[conda]
style = "bg:color_bg3"
format = '[[ $symbol( $environment) ](fg:color_fg0 bg:color_bg3)]($style)'

[pixi]
style = "bg:color_bg3"
format = '[[ $symbol( $version)( $environment) ](fg:color_fg0 bg:color_bg3)]($style)'

# =============================================================================
# Time (rightmost neutral segment)
# =============================================================================
[time]
disabled = false
time_format = "%R"
style = "bg:color_bg1"
format = '[[ пҗә $time ](fg:color_fg0 bg:color_bg1)]($style)'

# =============================================================================
# Layout
# =============================================================================
[line_break]
disabled = false

# =============================================================================
# Prompt Character
# =============================================================================
[character]
disabled = false
success_symbol = '[пҗІ](bold fg:color_green)'
error_symbol = '[пҗІ](bold fg:color_red)'
vimcmd_symbol = '[пҗҙ](bold fg:color_green)'
vimcmd_replace_one_symbol = '[пҗҙ](bold fg:color_purple)'
vimcmd_replace_symbol = '[пҗҙ](bold fg:color_purple)'
vimcmd_visual_symbol = '[пҗҙ](bold fg:color_yellow)'
