# Hyprland Share Picker
windowrule {
  name = windowrule-13
  float = on
  pin = on
  size = 600 400
  match:class = (hyprland-share-picker)
}

windowrule {
  name = windowrule-14
  center = on
  match:title = class:(hyprland-share-picker)
}

# General floating
windowrule {
  name = windowrule-15
  float = on
  size = 1000 700
  center = on
  pin = on
  match:class = (dotfiles-floating)
}

# System Updates (launched from Waybar -> installupdates.sh)
# This makes the update terminal float nicely, without affecting browsers or other apps.
windowrule {
  name = hypr-updates
  float = on
  center = on
  size = 1100 800
  # pin = on          # uncomment if you want it always on top
  # opacity removed - follows global decoration preset
  match:class = ^(hypr-updates)$
}

# Root Unlock (unlockroot.sh) — gum TUI with wide boxes (--width 95), figlet header,
# journalctl output, and interactive menus. Needs generous horizontal space so the
# output does not wrap or look squished. We target the specific title so this larger
# size only affects the unlock tool and not htop/bpytop/etc. which share the class.
windowrule {
  name = unlockroot
  float = on
  center = on
  size = 1380 860
  match:class = ^(dotfiles-floating)$
  match:title = ^(Root Unlock)$
}

# Color Palette preview (palette.sh) — matugen --show-colors output + gum menu.
# Sized to fit the actual (fairly compact) content. We match on class + a loose
# title so the rule applies reliably even if the terminal title gets tweaked slightly.
# Kitty launch requests ~95 columns as a content-aware hint.
windowrule {
  name = palette-preview
  float = on
  center = on
  size = 840 480
  match:class = ^(dotfiles-floating)$
  match:title = Color
}

