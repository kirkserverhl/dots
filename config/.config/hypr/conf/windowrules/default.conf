# -----------------------------------------------------
# Window rules (modern syntax)
# -----------------------------------------------------
# Define a named "floating utility" rule once
windowrule {
    name = float-utils
    float = true
    center = true
    size = 900 700
    # You can add more here: pin = true, noinitialfocus = true, etc.
}

# Then apply that rule to as many programs as you want
#windowrule {
#    name = float-utils
#    match:class = waypaper
#}
# === Floating monitors (top-right) ===

# pavucontrol (you already have)
windowrule = match:class ^(org.pulseaudio.pavucontrol)$, float on
windowrule = match:class ^(org.pulseaudio.pavucontrol)$, size 600 500
windowrule = match:class ^(org.pulseaudio.pavucontrol)$, move 100%-w-20 20

# Network Manager
windowrule = match:class ^(nm-connection-editor)$, float on
windowrule = match:class ^(nm-connection-editor)$, size 700 600
windowrule = match:class ^(nm-connection-editor)$, move 100%-w-20 20

# htop
windowrule = match:title ^(htop)$, float on
windowrule = match:title ^(htop)$, size 900 600
windowrule = match:title ^(htop)$, move 100%-w-20 20

# btop / bpytop
windowrule = match:title ^(btop)$, float on
windowrule = match:title ^(btop)$, size 1000 700
windowrule = match:title ^(btop)$, move 100%-w-20 20
windowrule {
    name = float-utils
    match:class = pavucontrol
}

windowrule {
    name = float-utils
    match:class = blueman-manager
}

windowrule {
    name = float-utils
    match:class = nm-connection-editor
}
# Network Manager (duplicate block)
windowrule = match:class ^(nm-connection-editor)$, float on
windowrule = match:class ^(nm-connection-editor)$, size 700 600     # adjust size if you want
windowrule = match:class ^(nm-connection-editor)$, move 100%-w-20 20

windowrule {
  name = windowrule-1
  float = on
