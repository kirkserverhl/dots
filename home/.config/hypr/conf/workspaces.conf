# =====================================================
# Workspace Layout - 2 workspaces per monitor
# =====================================================
# Goal:
#   Monitor 1 (leftmost)  -> Workspaces 1, 2
#   Monitor 2             -> Workspaces 3, 4
#   Monitor 3             -> Workspaces 5, 6
#   Monitor 4             -> Workspaces 7, 8
#
# Special workspace (scratchpad) is global and opens on the currently focused monitor.

# --- Persistent Workspaces (2 per monitor) ---
# Using desc: for stability when monitors reconnect

# Leftmost monitor (usually DP-1 - LG FULL HD)
workspace = 1, monitor:desc:LG Electronics LG FULL HD, persistent:true
workspace = 2, monitor:desc:LG Electronics LG FULL HD, persistent:true

# Second monitor (DVI-I-1 - 24CN65)
workspace = 3, monitor:desc:LG Electronics 24CN65, persistent:true
workspace = 4, monitor:desc:LG Electronics 24CN65, persistent:true

# Third monitor (HDMI-A-1)
workspace = 5, monitor:desc:LG Electronics LG Monitor, persistent:true
workspace = 6, monitor:desc:LG Electronics LG Monitor, persistent:true

# Fourth monitor (DVI-I-2 - TV or extra)
workspace = 7, monitor:desc:LG Electronics LG TV, persistent:true
workspace = 8, monitor:desc:LG Electronics LG TV, persistent:true

# --- Special Workspace (Scratchpad) ---
# Opens on whatever monitor is currently focused
workspace = special:scratchpad, persistent:true, on-created-empty: $TERMINAL
